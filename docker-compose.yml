x-common-config: &common-config
  build:
    context: .
    dockerfile: Dockerfile
  user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
  environment:
    HOME: /home/${LOCAL_USER:-nanobot}
    USER: ${LOCAL_USER:-nanobot}
    LOGNAME: ${LOCAL_USER:-nanobot}
  working_dir: /home/${LOCAL_USER:-nanobot}/nanobot
  volumes:
    - ${HOME}/nanobot:/home/${LOCAL_USER:-nanobot}/nanobot
    - ${HOME}/.nanobot:/home/${LOCAL_USER:-nanobot}/.nanobot
    - ${HOME}/.ssh:/home/${LOCAL_USER:-nanobot}/.ssh

services:
  nanobot-gateway:
    container_name: nanobot-gateway
    <<: *common-config
    command: ["gateway"]
    restart: unless-stopped
    ports:
      - 18790:18790
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  nanobot-cli:
    <<: *common-config
    profiles:
      - cli
    command: ["status"]
    stdin_open: true
    tty: true
